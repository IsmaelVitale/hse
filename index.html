<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação TV - DDS</title>
    <style>
        /* Reset básico e preparação para tela de TV (Full Screen) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Fundo preto para evitar faixas brancas na TV */
            overflow: hidden; /* Remove barras de rolagem */
            font-family: sans-serif;
        }

        #slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #slide-image {
            max-width: 100%;
            max-height: 100%;
            /* object-fit: contain garante que a proporção não mude e não corte nada */
            object-fit: contain;
            /* Transição suave de 1 segundo para não piscar na cara do colaborador */
            transition: opacity 1s ease-in-out;
            opacity: 1;
        }

        /* Classe usada no JS para criar o efeito de piscar/esmaecer */
        .fade-out {
            opacity: 0 !important;
        }

        /* Botão para entrar em tela cheia (opcional, pode ficar oculto) */
        #fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
        }
        #fullscreen-btn:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

<div id="slide-container">
    <!-- Slide Inicial. Coloque o caminho da sua primeira imagem aqui -->
    <!-- Exemplo: O PowerPoint costuma exportar como Slide1.JPG -->
    <img id="slide-image" src="imagens/Slide1.JPG" alt="DDS Slide" onerror="handleError()">
</div>

<!-- Botão de FullScreen para facilitar colocar a TV em tela cheia -->
<button id="fullscreen-btn" onclick="toggleFullScreen()">Tela Cheia (F11)</button>

<script>
    // ==========================================
    // CONFIGURAÇÕES DA APRESENTAÇÃO
    // ==========================================

    // Quantidade total de slides que o PPTX gerou (conte as imagens na pasta)
    const totalSlides = 18;

    // Tempo que cada slide fica na tela em milissegundos (15000 = 15 segundos)
    const tempoPorSlide = 15000;

    // Caminho e prefixo dos arquivos gerados pelo PowerPoint
    // Se a pasta for 'imagens' e o arquivo 'Slide1.JPG', fica assim:
    const pastaEPrefixo = 'imagens/Slide';

    // Extensão do arquivo (Cuidado com Maiúsculas/Minúsculas! O PPTX costuma usar .JPG ou .PNG)
    const extensao = '.JPG';

    // ==========================================

    let slideAtual = 1;
    const imgElement = document.getElementById('slide-image');
    let slideTimer;

    // Função principal que troca o slide
    function irParaProximoSlide() {
        // 1. Adiciona a classe que tira a opacidade (some com a imagem atual)
        imgElement.classList.add('fade-out');

        // 2. Espera 1 segundo (tempo do fade no CSS) para trocar a imagem e voltar a opacidade
        setTimeout(() => {
            slideAtual++;

            // Se passou do último, volta pro primeiro
            if (slideAtual > totalSlides) {
                slideAtual = 1;
            }

            // Monta o caminho novo (ex: imagens/Slide2.JPG)
            imgElement.src = `${pastaEPrefixo}${slideAtual}${extensao}`;

            // Remove a classe fade-out, fazendo a nova imagem aparecer suavemente
            imgElement.classList.remove('fade-out');
        }, 1000);
    }

    // Inicia o temporizador automático
    function iniciarSlideshow() {
        clearInterval(slideTimer);
        slideTimer = setInterval(irParaProximoSlide, tempoPorSlide);
    }

    // Função de fallback para o editor web caso as imagens não existam localmente
    function handleError() {
        imgElement.src = `https://via.placeholder.com/1920x1080/0033a0/FFFFFF?text=Slide+${slideAtual}+não+encontrado+(Verifique+a+pasta+imagens)`;
    }

    // Inicia assim que a página carrega
    window.onload = iniciarSlideshow;

    // --- EXTRAS DE SUPORTE (Atalhos legais) ---

    // Permite avançar clicando na tela (bom para testar)
    document.getElementById('slide-container').addEventListener('click', () => {
        irParaProximoSlide();
        iniciarSlideshow(); // Reseta o timer pra não pular rápido demais
    });

    // Setinhas do teclado para frente e para trás
    document.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowRight') {
            irParaProximoSlide();
            iniciarSlideshow();
        } else if (e.key === 'ArrowLeft') {
            imgElement.classList.add('fade-out');
            setTimeout(() => {
                slideAtual--;
                if (slideAtual < 1) slideAtual = totalSlides;
                imgElement.src = `${pastaEPrefixo}${slideAtual}${extensao}`;
                imgElement.classList.remove('fade-out');
            }, 1000);
            iniciarSlideshow();
        }
    });

    // Função nativa para tela cheia (esconde a barra do navegador na TV)
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Erro ao tentar modo tela cheia: ${err.message}`);
            });
            document.getElementById('fullscreen-btn').style.display = 'none'; // Esconde o botão ao entrar em tela cheia
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }
</script>
</body>
</html>
